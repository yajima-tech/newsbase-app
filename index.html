<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニューズベース 案件管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-l:#eff6ff;--blue-t:#1d4ed8;
  --green:#16a34a;--green-l:#f0fdf4;--green-t:#15803d;
  --amber:#d97706;--amber-l:#fffbeb;--amber-t:#b45309;
  --red:#ef4444;--red-l:#fef2f2;--red-t:#b91c1c;
  --purple:#9333ea;--purple-l:#faf5ff;--purple-t:#7e22ce;
  --gray:#6b7280;
  --border:#e5e7eb;--border-l:#f3f4f6;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --bg:#fff;--bg2:#f9fafb;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.12);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg2);color:var(--text);font-size:14px;min-height:100vh}

/* Header */
.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:24px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace}
.logo-text{font-size:14px;font-weight:700;color:var(--text)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-badge{font-size:11px;color:var(--green-t);background:var(--green-l);padding:3px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-err{color:var(--red-t);background:var(--red-l)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;transition:all .15s}
.btn-ghost{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8}

/* Main 2-column */
.main{max-width:1400px;margin:0 auto;padding:20px 24px}
.two-col{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}

/* Left pane */
.list-pane{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh);overflow:hidden;position:sticky;top:76px;max-height:calc(100vh - 96px);display:flex;flex-direction:column}
.list-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.list-hdr-title{font-size:13px;font-weight:500}
.filter-tabs{display:flex;gap:5px;padding:8px 14px;border-bottom:0.5px solid var(--border-l);flex-shrink:0}
.ftab{padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.ftab.on{background:var(--blue-l);border-color:#bfdbfe;color:var(--blue-t)}
.list-search{padding:8px 14px;border-bottom:0.5px solid var(--border-l);flex-shrink:0}
.list-search input{width:100%;border:0.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;outline:none;background:var(--bg2);color:var(--text)}
.list-search input:focus{border-color:var(--blue)}
.rows-wrap{overflow-y:auto;flex:1}
.row{padding:10px 14px;border-bottom:0.5px solid var(--border-l);cursor:pointer;transition:background .1s}
.row:hover{background:var(--bg2)}
.row.sel{background:var(--blue-l);border-left:3px solid var(--blue)}
.row.lost{opacity:.55}
.row-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-sub{display:flex;justify-content:space-between;align-items:center}
.row-client{font-size:10px;color:var(--text3)}

/* Right pane */
.detail-pane{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh);overflow:hidden}
.detail-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.detail-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:7px;line-height:1.4}
.detail-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.detail-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px}
.dtab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans JP',sans-serif}
.dtab.on{color:var(--blue);font-weight:500;border-bottom-color:var(--blue)}
.detail-body{padding:20px}
.dpane{display:none}.dpane.on{display:block}

/* Overview tab */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.info-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase}
.info-val{font-size:13px;color:var(--text);line-height:1.5}
.info-val.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.biz-box{background:var(--bg2);border-radius:7px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap;border:0.5px solid var(--border-l)}

/* Items */
.item-list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:7px;font-size:12px;line-height:1.6;border:0.5px solid transparent}
.item.req{background:var(--blue-l);border-color:#bfdbfe;color:var(--blue-t)}
.item.pend{background:var(--amber-l);border-color:#fde68a;color:var(--amber-t)}
.item.done{background:var(--green-l);border-color:#bbf7d0;color:var(--green-t)}
.item-icon{font-size:12px;flex-shrink:0;margin-top:2px}
.empty-items{font-size:12px;color:var(--text3);text-align:center;padding:16px;background:var(--bg2);border-radius:7px}

/* Summary tab */
.sum-box{background:var(--bg2);border-left:3px solid var(--blue);border-radius:0 7px 7px 0;padding:12px 14px;margin-bottom:16px}
.sum-meta{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.sum-txt{font-size:13px;color:var(--text2);line-height:1.7}
.hist-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-row{display:flex;gap:12px;font-size:12px}
.hist-date{color:var(--text3);font-family:'JetBrains Mono',monospace;flex-shrink:0;min-width:32px}
.hist-text{color:var(--text2);line-height:1.5}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-blue{background:var(--blue-l);color:var(--blue-t)}.badge-blue::before{background:var(--blue)}
.badge-green{background:var(--green-l);color:var(--green-t)}.badge-green::before{background:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber-t)}.badge-amber::before{background:var(--amber)}
.badge-red{background:var(--red-l);color:var(--red-t)}.badge-red::before{background:var(--red)}
.badge-purple{background:var(--purple-l);color:var(--purple-t)}.badge-purple::before{background:var(--purple)}
.badge-gray{background:#f3f4f6;color:#374151;border:0.5px solid var(--border)}.badge-gray::before{background:var(--gray)}

/* DL */
.dl{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;white-space:nowrap}
.dl.overdue{color:var(--red-t)}.dl.near{color:var(--amber-t);font-weight:700}.dl.ok{color:var(--text2)}.dl.none{color:var(--text3)}

/* Edit modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--bg2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border)}
.modal-body{padding:20px 24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-input,.form-select,.form-textarea{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;background:#fff;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue)}
.form-textarea{min-height:80px;resize:vertical}
.form-footer{display:flex;justify-content:flex-end;gap:8px;padding-top:4px;border-top:1px solid var(--border)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#111827;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:500;display:none;box-shadow:var(--sh-md)}
.toast.show{display:block}

/* Empty state */
.detail-empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:13px}

@media(max-width:900px){.two-col{grid-template-columns:1fr}.list-pane{position:static;max-height:280px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">NB</div>
      <span class="logo-text">ニューズベース案件管理</span>
    </a>
    <div class="header-actions">
      <span class="sync-badge" id="syncBadge"><span class="sync-dot" id="syncDot"></span><span id="syncText">接続中...</span></span>
      <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV出力</button>
      <button class="btn btn-primary" onclick="openEdit(null)">＋ 新規作成</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="two-col">

    <!-- 左ペイン：案件リスト -->
    <div class="list-pane">
      <div class="list-hdr">
        <span class="list-hdr-title">案件一覧</span>
        <span style="font-size:11px;color:var(--text3)" id="countLabel">—</span>
      </div>
      <div class="filter-tabs">
        <button class="ftab on" onclick="setFilter('all',this)">すべて</button>
        <button class="ftab" onclick="setFilter('active',this)">進行中</button>
        <button class="ftab" onclick="setFilter('lost',this)">失注</button>
      </div>
      <div class="list-search">
        <input type="text" placeholder="案件名・クライアントで検索..." id="listSearch" oninput="renderList()">
      </div>
      <div class="rows-wrap" id="rowsWrap">
        <div class="detail-empty">Firebaseに接続中...</div>
      </div>
    </div>

    <!-- 右ペイン：詳細 -->
    <div class="detail-pane">
      <div class="detail-hdr">
        <div class="detail-title" id="detailTitle">案件を選択してください</div>
        <div class="detail-meta" id="detailMeta"></div>
      </div>
      <div class="detail-tabs">
        <button class="dtab on" onclick="switchDetailTab('overview',this)">概要</button>
        <button class="dtab" onclick="switchDetailTab('requests',this)">依頼事項</button>
        <button class="dtab" onclick="switchDetailTab('pending',this)">確認事項</button>
        <button class="dtab" onclick="switchDetailTab('summary',this)">メール要約</button>
      </div>
      <div class="detail-body">
        <div class="dpane on" id="dpane-overview"><div class="detail-empty">左の案件一覧から案件を選択してください</div></div>
        <div class="dpane" id="dpane-requests"></div>
        <div class="dpane" id="dpane-pending"></div>
        <div class="dpane" id="dpane-summary"></div>
      </div>
    </div>

  </div>
</main>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal('editModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editTitle">案件を編集</span>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body" id="editBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCRGRClqzoraxXju9wDmqU1CVJzCO85Bek",
  authDomain: "newsbase-app-2026.firebaseapp.com",
  projectId: "newsbase-app-2026",
  storageBucket: "newsbase-app-2026.appspot.com",
  messagingSenderId: "433486255319",
  appId: "1:433486255319:web:2c29785f9a17eaab318c92"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── グローバル変数 ────────────────────────────────────────────
let allProjects   = [];
let currentId     = null;
let currentFilter = 'all';
let currentTab    = 'overview';

// ── ステータス→バッジ対応表 ─────────────────────────────────
const STATUS_MAP = {
  '見積依頼受領':           'badge-blue',
  '見積作成中':             'badge-amber',
  '詳細確認中':             'badge-amber',
  '見積提出済み・引合い中': 'badge-purple',
  '受注済み・準備中':       'badge-green',
  '失注':                   'badge-gray',
};

// ── Firestore リアルタイム監視 ──────────────────────────────
const q = query(collection(db, 'projects'), orderBy('updated_at', 'desc'));

onSnapshot(q, (snapshot) => {
  allProjects = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
  if (currentId) {
    const p = allProjects.find(x => x.id === currentId);
    if (p) renderDetail(p);
  } else if (allProjects.length > 0) {
    selectProject(allProjects[0].id);
  }
  const now = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('syncText').textContent = '同期済 ' + now;
  document.getElementById('syncBadge').classList.remove('sync-err');
  document.getElementById('syncDot').style.background = 'var(--green)';
  document.getElementById('countLabel').textContent = allProjects.length + '件';
}, (err) => {
  console.error('Firestore error:', err);
  document.getElementById('syncText').textContent = '接続エラー';
  document.getElementById('syncBadge').classList.add('sync-err');
  document.getElementById('syncDot').style.background = 'var(--red)';
});

// ── ヘルパー関数 ──────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function dlInfo(dl) {
  if (!dl) return { cls:'none', label:'—' };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dl);
  const diff = Math.ceil((d - today) / 86400000);
  const label = (d.getMonth()+1) + '/' + d.getDate();
  if (diff < 0)   return { cls:'overdue', label: label + '（超過）' };
  if (diff === 0) return { cls:'near',    label: label + '（本日!）' };
  if (diff <= 7)  return { cls:'near',    label: label + '（あと' + diff + '日）' };
  return { cls:'ok', label };
}

function fmtDateLong(d) {
  if (!d) return null;
  const dt = new Date(d);
  const w = ['日','月','火','水','木','金','土'][dt.getDay()];
  return (dt.getMonth()+1) + '月' + dt.getDate() + '日（' + w + '）';
}

// ── 左ペイン：案件リスト描画 ────────────────────────────────
window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  renderList();
};

window.renderList = () => {
  const q = document.getElementById('listSearch')?.value.toLowerCase() || '';
  const list = allProjects.filter(p => {
    const isLost = p.status === '失注';
    if (currentFilter === 'active' && isLost) return false;
    if (currentFilter === 'lost'   && !isLost) return false;
    if (q) {
      const s = ((p.project_name||'') + (p.client||'')).toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });

  const wrap = document.getElementById('rowsWrap');
  if (!list.length) {
    wrap.innerHTML = '<div class="detail-empty">該当する案件がありません</div>';
    return;
  }

  wrap.innerHTML = list.map(p => {
    const sc   = STATUS_MAP[p.status] || 'badge-gray';
    const isLost = p.status === '失注';
    return `<div class="row${p.id === currentId?' sel':''}${isLost?' lost':''}" onclick="selectProject('${esc(p.id)}')">
      <div class="row-name">${esc(p.project_name || p.email_subject || '（案件名不明）')}</div>
      <div class="row-sub">
        <span class="row-client">${esc(p.client||'—')}${p.contact?' / '+esc(p.contact):''}</span>
        <span class="badge ${sc}" style="font-size:10px;padding:1px 8px">${esc(p.status||'不明')}</span>
      </div>
    </div>`;
  }).join('');
};

// ── 案件選択 ──────────────────────────────────────────────────
window.selectProject = (id) => {
  currentId = id;
  const p = allProjects.find(x => x.id === id);
  if (p) { renderList(); renderDetail(p); }
};

// ── 右ペイン：詳細描画 ──────────────────────────────────────
function renderDetail(p) {
  const sc = STATUS_MAP[p.status] || 'badge-gray';
  const di = dlInfo(p.estimate_deadline);
  const mainDate = fmtDateLong(p.event_date);
  const prepDate = fmtDateLong(p.prep_date);

  document.getElementById('detailTitle').textContent = p.project_name || p.email_subject || '案件詳細';
  document.getElementById('detailMeta').innerHTML =
    `<span class="badge ${sc}">${esc(p.status||'不明')}</span>` +
    (p.estimate_deadline
      ? `<span class="badge ${di.cls==='overdue'?'badge-red':di.cls==='near'?'badge-amber':'badge-gray'}">見積期限: ${esc(di.label)}</span>`
      : '');

  // ── 概要 ────────────────────────────────────────────────────
  document.getElementById('dpane-overview').innerHTML = `
    <div class="info-grid">
      <div><div class="info-lbl">クライアント</div><div class="info-val">${esc(p.client||'—')}</div></div>
      <div><div class="info-lbl">NB担当者</div><div class="info-val">${esc(p.contact||'—')}</div></div>
      <div><div class="info-lbl">本番日</div><div class="info-val mono">${mainDate?esc(mainDate):'未定'}</div></div>
      <div><div class="info-lbl">準備日</div><div class="info-val mono">${prepDate?esc(prepDate):'—'}</div></div>
    </div>
    <div style="margin-bottom:14px">
      <div class="info-lbl" style="margin-bottom:4px">会場</div>
      <div class="info-val" style="white-space:pre-wrap">${esc(p.venue||'—')}</div>
      ${p.venue_detail?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(p.venue_detail)}</div>`:''}
    </div>
    <div>
      <div class="info-lbl" style="margin-bottom:4px">業務内容</div>
      <div class="biz-box">${esc(p.business_content||'—')}</div>
    </div>
    ${p.note?`<div style="margin-top:14px"><div class="info-lbl" style="margin-bottom:4px">メモ</div><div style="font-size:12px;color:var(--text2);white-space:pre-wrap">${esc(p.note)}</div></div>`:''}
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border-l);display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openEdit('${esc(p.id)}')">編集する</button>
    </div>`;

  // ── 依頼事項 ─────────────────────────────────────────────────
  const reqs = Array.isArray(p.requests) ? p.requests : [];
  document.getElementById('dpane-requests').innerHTML = reqs.length
    ? `<div class="item-list">${reqs.map(r =>
        `<div class="item req"><span class="item-icon">▶</span><span>${esc(typeof r==='object'?r.text:r)}</span></div>`
      ).join('')}</div>`
    : `<div class="empty-items">依頼事項はまだ抽出されていません。<br>メールが同期されると自動で表示されます。</div>`;

  // ── 確認事項 ─────────────────────────────────────────────────
  const pendings = Array.isArray(p.pending_items) ? p.pending_items : [];
  document.getElementById('dpane-pending').innerHTML = pendings.length
    ? `<div class="item-list">${pendings.map(item => {
        const done = typeof item === 'object' ? !!item.done : false;
        const text = typeof item === 'object' ? item.text  : item;
        return `<div class="item ${done?'done':'pend'}"><span class="item-icon">${done?'✓':'◈'}</span><span>${esc(text)}</span></div>`;
      }).join('')}</div>`
    : `<div class="empty-items">未確認事項はありません ✓</div>`;

  // ── メール要約 ───────────────────────────────────────────────
  const hist = Array.isArray(p.email_history) ? p.email_history : [];
  // 送受信タイムライン生成
  const histItems = hist.map(h => {
    const dir = h.dir || '';
    const isSent = dir === '→送信';
    const isRecv = dir === '←受信';
    const dirLabel = isSent
      ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--blue-t);background:var(--blue-l);padding:1px 6px;border-radius:10px;flex-shrink:0">→ 送信</span>`
      : isRecv
        ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--green-t);background:var(--green-l);padding:1px 6px;border-radius:10px;flex-shrink:0">← 受信</span>`
        : '';
    return `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border-l)">
      <span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;min-width:30px;margin-top:1px">${esc(h.date||'')}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">
          ${dirLabel}
          <span style="font-size:11px;color:var(--text3)">${esc(h.from||'')}</span>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">${esc(h.text||'')}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('dpane-summary').innerHTML = `
    <div class="sum-box">
      <div class="sum-meta">${esc(p.latest_sender||p.contact||'—')} · ${esc(p.latest_email_date||p.synced_at?.slice(0,10)||'—')} · 最新メール</div>
      <div class="sum-txt">${esc(p.latest_summary||p.email_subject||'要約情報がありません')}</div>
    </div>
    ${hist.length ? `
      <div style="font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span>やりとり履歴</span>
        <span style="font-weight:400;font-size:10px">${hist.length}件</span>
      </div>
      <div style="margin-bottom:4px;display:flex;gap:6px">
        <span style="font-size:10px;color:var(--blue-t);background:var(--blue-l);padding:1px 6px;border-radius:10px">→ 送信: ${hist.filter(h=>h.dir==='→送信').length}件</span>
        <span style="font-size:10px;color:var(--green-t);background:var(--green-l);padding:1px 6px;border-radius:10px">← 受信: ${hist.filter(h=>h.dir==='←受信').length}件</span>
      </div>
      <div>${histItems}</div>` : '<div class="empty-items">メール履歴がありません</div>'}`;

  switchDetailTabTo(currentTab);
}

// ── タブ切り替え ─────────────────────────────────────────────
window.switchDetailTab = (name, btn) => {
  currentTab = name;
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  switchDetailTabTo(name);
};
function switchDetailTabTo(name) {
  ['overview','requests','pending','summary'].forEach(t => {
    document.getElementById('dpane-'+t)?.classList.toggle('on', t===name);
  });
}

// ── 編集モーダル ─────────────────────────────────────────────
window.openEdit = (id) => {
  const p = id ? (allProjects.find(x => x.id === id) || {}) : {};
  document.getElementById('editTitle').textContent = id ? '案件を編集' : '新規案件作成';
  const statuses = ['見積依頼受領','見積作成中','詳細確認中','見積提出済み・引合い中','受注済み・準備中','失注'];
  const sOpts = statuses.map(s => `<option value="${s}"${p.status===s?' selected':''}>${s}</option>`).join('');
  document.getElementById('editBody').innerHTML = `
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">案件名 *</label>
        <input class="form-input" id="f-name" value="${esc(p.project_name||'')}" placeholder="例: RSJ Technology Symposium 2026">
      </div>
      <div class="form-group">
        <label class="form-label">クライアント</label>
        <input class="form-input" id="f-client" value="${esc(p.client||'')}">
      </div>
      <div class="form-group">
        <label class="form-label">NB担当者</label>
        <input class="form-input" id="f-contact" value="${esc(p.contact||'')}">
      </div>
      <div class="form-group">
        <label class="form-label">本番日</label>
        <input class="form-input" id="f-date" type="date" value="${p.event_date||''}">
      </div>
      <div class="form-group">
        <label class="form-label">準備日</label>
        <input class="form-input" id="f-prep" type="date" value="${p.prep_date||''}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">会場</label>
        <input class="form-input" id="f-venue" value="${esc(p.venue||'')}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">業務内容</label>
        <textarea class="form-textarea" id="f-biz">${esc(p.business_content||'')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">見積提出期限</label>
        <input class="form-input" id="f-dl" type="date" value="${p.estimate_deadline||''}">
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-select" id="f-status">${sOpts}</select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="f-note">${esc(p.note||'')}</textarea>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit('${esc(id||'')}')">保存する</button>
    </div>`;
  document.getElementById('editModal').classList.add('open');
};

window.saveEdit = async (id) => {
  const g = i => document.getElementById(i)?.value.trim() || '';
  const name = g('f-name');
  if (!name) { alert('案件名は必須です'); return; }
  const data = {
    project_name:      name,
    client:            g('f-client'),
    contact:           g('f-contact'),
    event_date:        g('f-date') || null,
    prep_date:         g('f-prep') || null,
    venue:             g('f-venue'),
    business_content:  g('f-biz'),
    estimate_deadline: g('f-dl') || null,
    status:            g('f-status'),
    note:              g('f-note'),
    updated_at:        new Date().toISOString(),
    manually_edited:   true
  };
  try {
    if (id) {
      await updateDoc(doc(db, 'projects', id), data);
    } else {
      await addDoc(collection(db, 'projects'), data);
    }
    closeModal('editModal');
    showToast('✓ 保存しました');
  } catch(e) {
    console.error(e);
    alert('保存に失敗しました: ' + e.message);
  }
};

// ── CSV出力 ───────────────────────────────────────────────────
window.exportCSV = () => {
  const headers = ['案件名','クライアント','担当者','本番日','準備日','会場','業務内容','見積期限','ステータス','メモ'];
  const rows = allProjects.map(p => [
    p.project_name, p.client, p.contact, p.event_date, p.prep_date,
    p.venue, p.business_content, p.estimate_deadline, p.status, p.note
  ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"'));
  const csv = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv;charset=utf-8' }));
  a.download = 'newsbase-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('✓ CSVを出力しました');
};

// ── モーダル・トースト ────────────────────────────────────────
window.closeModal = (id) => document.getElementById(id)?.classList.remove('open');
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
